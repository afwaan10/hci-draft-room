<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="../../assets/brand/moba-hub-favicon-32.png"><title>Choose New Password · MOBA HUB</title><link rel="stylesheet" href="../../css/moba-hub.css">  <script src="../../js/path-config.js"></script>
<script>window.setTimeout(function(){document.body?.classList.add('auth-ready');var l=document.querySelector('.mh-loader');if(l){l.classList.add('is-done');window.setTimeout(function(){l.remove();},280);}},6000);</script></head><body data-auth="public"><div class="mh-loader"><div class="mh-loader-card"><div class="mh-loader-mark"><img src="../../assets/brand/moba-hub-icon.png" alt="MOBA HUB"></div><div class="mh-spinner"></div></div></div><main class="auth-page"><section class="auth-panel"><a class="auth-brand" href="../../auth/login/"><img class="auth-brand-logo" src="../../assets/brand/moba-hub-logo-horizontal.png" alt="MOBA HUB"></a><div class="auth-card"><span class="mh-kicker">New password</span><h1>Secure your account.</h1><p>Your password may be as long as needed and must contain at least 8 characters.</p><form class="auth-form" id="authForm" data-mode="reset"><div class="mh-field"><label for="password">New Password</label><div style="display:flex;gap:8px"><input class="mh-input" id="password" type="password" autocomplete="new-password" minlength="8" required><button class="mh-btn" type="button" data-toggle-password="password">Show</button></div></div><div class="mh-field"><label for="confirmPassword">Confirm New Password</label><div style="display:flex;gap:8px"><input class="mh-input" id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required><button class="mh-btn" type="button" data-toggle-password="confirmPassword">Show</button></div></div><button class="mh-btn primary" id="authSubmit" type="submit">Update Password</button><p class="mh-status" id="authStatus" role="status"></p></form></div></section><section class="auth-visual"><div class="auth-visual-content"><img class="auth-visual-logo" src="../../assets/brand/moba-hub-logo-white.png" alt="MOBA HUB Competitive Tools"><span class="mh-kicker">MOBA HUB</span><h2>Create a password only you know.</h2></div></section></main><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="../../js/firebase-config.js"></script><script src="../../js/app-core.js"></script><script src="../../js/auth.js"></script></body></html>
