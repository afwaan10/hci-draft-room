<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="../assets/brand/moba-hub-favicon-32.png" />
  <title>Draft History · MOBA HUB</title>
  <meta name="description" content="Review your completed MOBA HUB draft sessions." />
  <link rel="stylesheet" href="../css/moba-hub.css" />
  <script src="../js/path-config.js"></script>
<script>window.setTimeout(function(){document.body?.classList.add('auth-ready');var l=document.querySelector('.mh-loader');if(l){l.classList.add('is-done');window.setTimeout(function(){l.remove();},280);}},6000);</script></head>
<body data-auth="protected">
  <div class="mh-loader">
    <div class="mh-loader-card">
      <div class="mh-loader-mark"><img src="../assets/brand/moba-hub-icon.png" alt="MOBA HUB" /></div>
      <div class="mh-spinner"></div>
      <small>Loading Draft History</small>
    </div>
  </div>

  <div class="mh-app">
    <header class="mh-nav">
      <div class="mh-nav-inner">
        <a class="mh-brand" href="../">
          <span class="mh-brand-mark"><img src="../assets/brand/moba-hub-icon.png" alt="MOBA HUB" /></span>
          <span>MOBA HUB</span>
        </a>
        <button class="mh-menu-toggle" data-nav-toggle type="button" aria-expanded="false" aria-label="Open navigation">☰</button>
        <nav class="mh-nav-links" data-nav-links>
          <a href="../">Home</a>
          <a href="../games/hok/">Honor of Kings</a>
          <a href="../games/mlbb/">Mobile Legends</a><a href="../games/aov/">Arena of Valor</a>
          <a href="../team-center/">Team Center</a>
        </nav>
        <div class="mh-profile-wrap">
          <button class="mh-profile-btn" data-profile-toggle type="button" aria-label="Open profile menu">
            <span class="mh-avatar" data-user-photo>M</span>
            <span class="mh-profile-copy"><strong data-user-name>User</strong><small>Draft History</small></span>
          </button>
          <div class="mh-menu" data-profile-menu hidden>
            <a href="../profile/">Profile</a>
            <a href="../team-center/">Team Center</a>
            <a href="../draft-history/" aria-current="page">Draft History</a>
            <button class="danger" data-logout type="button">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main class="mh-main">
      <header class="mh-page-head">
        <div>
          <span class="mh-kicker">Account archive</span>
          <h1>Draft History</h1>
          <p>Completed draft sessions associated with your account appear below.</p>
        </div>
      </header>
      <section class="mh-grid cols-3" id="historyList">
        <div class="mh-empty" style="grid-column:1/-1">Loading draft history…</div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/app-core.js"></script>
  <script src="../js/draft-history.js"></script>
</body>
</html>
