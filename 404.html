<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#07090d">
  <title>Page Not Found · MOBA HUB</title>
  <script>
    (() => {
      const parts = location.pathname.split('/').filter(Boolean);
      const draftIndex = parts.indexOf('draft');
      let baseParts = [];

      if (draftIndex >= 0) {
        baseParts = parts.slice(0, draftIndex);
        const game = parts[draftIndex + 1];
        const room = parts[draftIndex + 2];
        if ((game === 'hok' || game === 'mlbb') && room) {
          const base = `/${baseParts.length ? `${baseParts.join('/')}/` : ''}`;
          location.replace(`${base}${game}/?room=${encodeURIComponent(room)}&route=draft${location.hash || ''}`);
          return;
        }
      } else if (location.hostname.endsWith('github.io') && parts.length) {
        baseParts = [parts[0]];
      }

      const base = `/${baseParts.length ? `${baseParts.join('/')}/` : ''}`;
      window.MOBA_HUB_404_BASE = base;
      const stylesheet = document.createElement('link');
      stylesheet.rel = 'stylesheet';
      stylesheet.href = `${base}css/moba-hub.css`;
      document.head.appendChild(stylesheet);
      const icon = document.createElement('link');
      icon.rel = 'icon';
      icon.href = `${base}assets/brand/moba-hub-icon.png`;
      document.head.appendChild(icon);
    })();
  </script>
  <style>
    html,body{margin:0;min-height:100%;background:#07090d;color:#f5f7fb;font-family:Arial,sans-serif}
    .fallback-404{min-height:100vh;display:grid;place-items:center;padding:24px}
    .fallback-card{width:min(560px,100%);padding:32px;border:1px solid #273243;border-radius:22px;background:#101722}
    .fallback-card h1{font-size:clamp(32px,8vw,56px);margin:10px 0}.fallback-card p{color:#aeb9c8;line-height:1.6}
    .fallback-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px}.fallback-actions a{padding:12px 18px;border-radius:12px;background:#d5a82e;color:#080b10;text-decoration:none;font-weight:800}.fallback-actions a+ a{background:#1b2635;color:#fff}
  </style>
</head>
<body class="auth-ready">
  <main class="fallback-404">
    <section class="fallback-card">
      <strong>MOBA HUB · 404</strong>
      <h1>Page not found.</h1>
      <p>The requested route does not exist or has moved. Return to the main competitive workspace.</p>
      <div class="fallback-actions">
        <a id="returnHome" href="./">Return Home</a>
        <a id="openHok" href="./games/hok/">Honor of Kings Tools</a>
      </div>
    </section>
  </main>
  <script>
    document.getElementById('returnHome').href = window.MOBA_HUB_404_BASE || './';
    document.getElementById('openHok').href = `${window.MOBA_HUB_404_BASE || './'}games/hok/`;
  </script>
</body>
</html>
